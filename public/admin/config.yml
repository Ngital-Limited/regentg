# Decap CMS configuration for Regent Design & Development Ltd
# Editors log in via Netlify Identity (email + password) — see DEPLOYMENT.md

backend:
  name: git-gateway
  branch: main

# Where Decap uploads images that editors add via the rich-text editor
media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://regentgroup.com.bd
display_url: https://regentgroup.com.bd
logo_url: https://regentgroup.com.bd/regent-dark-logo.png

# All content is committed to the GitHub repo — Horizons rebuilds on commit
publish_mode: simple

collections:
  # =====================================================
  # SITE SETTINGS (single file)
  # =====================================================
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "Contact & General Info"
        file: "content/settings.json"
        format: "json"
        fields:
          - { name: companyName, label: "Company Name", widget: string }
          - { name: hotline, label: "Hotline (display)", widget: string }
          - { name: hotlineHref, label: "Hotline (link)", widget: string, hint: "e.g. tel:01810009333" }
          - { name: email, label: "Email", widget: string }
          - { name: address, label: "Head Office Address", widget: text }
          - { name: officeHours, label: "Office Hours", widget: string }
          - { name: website, label: "Website (display)", widget: string }
          - { name: mapEmbedUrl, label: "Google Maps Embed URL", widget: string, required: false }
          - name: social
            label: "Social Links"
            widget: object
            fields:
              - { name: facebook, label: Facebook, widget: string, required: false }
              - { name: youtube, label: YouTube, widget: string, required: false }
              - { name: linkedin, label: LinkedIn, widget: string, required: false }
              - { name: instagram, label: Instagram, widget: string, required: false }

  # =====================================================
  # PROJECTS
  # =====================================================
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{name}} — {{location}} ({{status}})"
    sortable_fields: ['name', 'date', 'status']
    fields:
      - { name: name, label: "Project Name", widget: string }
      - { name: tagline, label: "Tagline", widget: string, required: false }
      - name: status
        label: "Status"
        widget: select
        options: ["ongoing", "completed", "upcoming"]
      - { name: type, label: "Type", widget: string, default: "Residential" }
      - { name: location, label: "Location", widget: string }
      - { name: size, label: "Size", widget: string, required: false, hint: "e.g. 1350-3280 SFT" }
      - { name: bedrooms, label: "Bedrooms", widget: string, required: false }
      - { name: image, label: "Card Thumbnail (URL)", widget: string, required: false }
      - { name: heroImage, label: "Hero Image (URL)", widget: string, required: false }
      - { name: brochureUrl, label: "Brochure PDF URL", widget: string, required: false }
      - { name: lat, label: "Latitude", widget: number, required: false, value_type: float }
      - { name: lng, label: "Longitude", widget: number, required: false, value_type: float }
      - name: features
        label: "Features"
        widget: list
        required: false
        field: { name: feature, label: "Feature", widget: string }
      - name: glance
        label: "At a Glance"
        widget: list
        required: false
        fields:
          - { name: icon, label: "Icon", widget: select, options: ["address", "size", "bedroom", "facing", "floor", "apartments", "total", "designer", "handover"] }
          - { name: label, label: "Label", widget: string }
          - { name: value, label: "Value", widget: string }
      - name: progress
        label: "Construction Progress"
        widget: list
        required: false
        fields:
          - { name: label, label: "Stage", widget: string }
          - { name: value, label: "Percent (0-100)", widget: number, value_type: int, min: 0, max: 100 }
      - name: gallery
        label: "Gallery (Image URLs)"
        widget: list
        required: false
        field: { name: url, label: "Image URL", widget: string }
      - { name: body, label: "Overview", widget: markdown, required: false }

  # =====================================================
  # BLOG
  # =====================================================
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ['date', 'title']
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: date, label: "Date", widget: string, hint: "e.g. March 10, 2026" }
      - { name: category, label: "Category", widget: string }
      - { name: author, label: "Author", widget: string, default: "Regent Editorial" }
      - { name: readTime, label: "Read Time", widget: string, default: "5 min read" }
      - { name: excerpt, label: "Excerpt", widget: text }
      - { name: image, label: "Featured Image URL", widget: string }
      - { name: body, label: "Content", widget: markdown }

  # =====================================================
  # NEWS
  # =====================================================
  - name: "news"
    label: "News & Events"
    label_singular: "News Item"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    sortable_fields: ['date', 'title']
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: date, label: "Date", widget: string }
      - { name: excerpt, label: "Excerpt", widget: text }
      - { name: image, label: "Featured Image URL", widget: string, required: false }
      - { name: body, label: "Content", widget: markdown }

  # =====================================================
  # VIDEOS
  # =====================================================
  - name: "videos"
    label: "Videos"
    label_singular: "Video"
    folder: "content/videos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{category}}"
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: description, label: "Description", widget: text }
      - { name: category, label: "Category", widget: string, default: "Project Tour" }
      - { name: date, label: "Date", widget: string, default: "2025" }
      - { name: duration, label: "Duration Label", widget: string, default: "Watch" }
      - { name: youtubeId, label: "YouTube Video ID", widget: string, hint: "The ID from the YouTube URL — e.g. for youtu.be/N3_4QtpgoZs use N3_4QtpgoZs" }
